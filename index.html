<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NETBREACH GEN</title>

<!-- PWA -->
<link rel="manifest" id="manifest">
<meta name="theme-color" content="#000000">

<style>
:root{
    --bg:#050505;
    --panel:rgba(255,0,0,0.06);
    --stroke:rgba(255,0,0,0.18);
    --accent:#ff2a2a;
    --text:#fff;
    --muted:rgba(255,255,255,0.6);
}

/* ---------------- BASE ---------------- */
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,Arial;
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
}

/* ---------------- BACKGROUND ---------------- */
.bg{
    position:fixed;
    inset:0;
    background:
      radial-gradient(circle at 20% 20%,rgba(255,0,0,0.18),transparent 40%),
      radial-gradient(circle at 80% 30%,rgba(255,255,255,0.05),transparent 45%),
      radial-gradient(circle at 50% 80%,rgba(255,0,0,0.10),transparent 50%);
    filter:blur(50px);
    animation:float 10s ease-in-out infinite;
    z-index:-1;
}
@keyframes float{
    0%{transform:translate(0,0)}
    50%{transform:translate(-2%,-3%)}
    100%{transform:translate(0,0)}
}

/* ---------------- LAYOUT ---------------- */
.app{
    display:flex;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:rgba(0,0,0,0.6);
    border-right:1px solid var(--stroke);
    padding:15px;
    backdrop-filter:blur(12px);
}

.logo{
    font-weight:700;
    letter-spacing:2px;
    margin-bottom:20px;
}

.nav button{
    width:100%;
    margin-bottom:10px;
    padding:12px;
    border-radius:10px;
    border:1px solid var(--stroke);
    background:var(--panel);
    color:white;
    transition:.25s cubic-bezier(.2,.8,.2,1);
}
.nav button:hover{
    transform:translateX(4px);
    background:rgba(255,0,0,0.12);
}

/* MAIN */
.main{
    flex:1;
    padding:18px;
}

/* HEADER */
h1{
    margin:0;
}

/* TOP BAR */
.topbar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
}

/* BUTTONS */
button{
    border:none;
    border:1px solid var(--stroke);
    background:var(--panel);
    color:white;
    padding:12px;
    border-radius:12px;
    cursor:pointer;
    transition:.25s cubic-bezier(.2,.8,.2,1);
    min-width:120px;
}
button:active{
    transform:scale(0.95);
}
.primary{
    border:1px solid var(--accent);
    box-shadow:0 0 14px rgba(255,0,0,0.25);
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:10px;
    margin-top:15px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.04);
    border:1px solid var(--stroke);
    padding:12px;
    border-radius:14px;
    cursor:pointer;
    transition:.25s cubic-bezier(.2,.8,.2,1);
}
.card:hover{
    transform:translateY(-4px) scale(1.02);
}
.rare{
    border:1px solid var(--accent);
    box-shadow:0 0 16px rgba(255,0,0,0.3);
}

/* SCORE */
.score{
    font-size:12px;
    color:var(--muted);
}

/* PANEL */
.panel{
    margin-top:12px;
    padding:12px;
    border-radius:14px;
    border:1px solid var(--stroke);
    background:rgba(0,0,0,0.4);
}

/* MOBILE */
@media(max-width:768px){
    .sidebar{width:80px}
    .logo{font-size:12px}
    button{min-width:90px;font-size:12px}
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">Menu</div>

    <div class="nav">
        <button onclick="setMode('4C')">4C</button>
        <button onclick="setMode('4L')">4L</button>
        <button onclick="generate()">Generate</button>
        <button onclick="copyAll()">Copy</button>
        <button onclick="openAll()">Open</button>
    </div>
</div>

<!-- MAIN -->
<div class="main">

<h1>NETBREACH WEB</h1>

<div class="topbar">
    <button class="primary" onclick="generate()">Generate 100</button>
</div>

<div class="panel" id="grid"></div>

</div>

</div>

<script>

let mode="4C";
let list=[];

/* ---------------- SOUND ---------------- */
function beep(){
    try{
        const ctx=new (window.AudioContext||window.webkitAudioContext)();
        const osc=ctx.createOscillator();
        osc.frequency.value=120;
        osc.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime+0.05);
    }catch(e){}
}

/* ---------------- RARITY SCORE (0–100) ---------------- */
function score(u){
    let s=0;

    if([...new Set(u)].length===1) s+=40;
    if(/(\w)\1\1/.test(u)) s+=20;
    if(u===u.split("").reverse().join("")) s+=25;
    if(/^[a-z]{4}$/.test(u)) s+=10;
    if(/[0-9]/.test(u)) s+=5;

    return Math.min(100,s);
}

/* ---------------- GENERATE ---------------- */
function rand(c){return c[Math.floor(Math.random()*c.length)]}

function generate(){
    beep();
    list=[];
    let grid=document.getElementById("grid");
    grid.innerHTML="";

    let chars=mode==="4L"
        ?"abcdefghijklmnopqrstuvwxyz"
        :"abcdefghijklmnopqrstuvwxyz0123456789";

    for(let i=0;i<100;i++){
        let u="";
        for(let j=0;j<4;j++)u+=rand(chars);

        let s=score(u);

        let div=document.createElement("div");
        div.className="card";

        if(s>60)div.classList.add("rare");

        div.innerHTML=`
            <div>${u}</div>
            <div class="score">OG Score: ${s}/100</div>
        `;

        div.onclick=()=>{
            navigator.clipboard.writeText(u);
            beep();
            if(navigator.vibrate) navigator.vibrate(20);
            window.open("https://instagram.com/"+u);
        };

        list.push(u);
        grid.appendChild(div);
    }
}

/* ---------------- COPY ---------------- */
function copyAll(){
    navigator.clipboard.writeText(list.join("\n"));
    beep();
}

/* ---------------- OPEN ---------------- */
function openAll(){
    list.slice(0,10).forEach(u=>{
        window.open("https://instagram.com/"+u);
    });
}

/* ---------------- MODE ---------------- */
function setMode(m){mode=m}

</script>

</body>
</html>
