<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Username Tool Pro</title>

<style>
/* ---------- BASE ---------- /
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: white;
    overflow-x: hidden;
}

/ ---------- ANIMATED BACKGROUND ---------- /
.bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 40%),
                radial-gradient(circle at 80% 30%, rgba(255,255,255,0.05), transparent 40%),
                radial-gradient(circle at 50% 80%, rgba(255,255,255,0.04), transparent 50%);
    animation: moveBg 12s linear infinite;
    z-index: -1;
    filter: blur(20px);
}

@keyframes moveBg {
    0% { transform: translate(0,0); }
    50% { transform: translate(-10%, -10%); }
    100% { transform: translate(0,0); }
}

/ ---------- HEADER ---------- /
h1 {
    text-align: center;
    margin-top: 20px;
    letter-spacing: 2px;
    font-size: 22px;
}

/ ---------- BUTTONS ---------- /
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    padding: 10px;
}

button {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    min-width: 110px;
    transition: 0.2s;
    backdrop-filter: blur(10px);
}

button:active {
    transform: scale(0.96);
}

/ ---------- GRID ---------- /
.output {
    width: 92%;
    margin: auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 10px;
    margin-top: 15px;
}

/ ---------- USER BOX ---------- /
.user {
    padding: 12px;
    text-align: center;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    transition: 0.2s;
    font-size: 14px;
    user-select: none;
}

.user:active {
    transform: scale(0.95);
}

.rare {
    border: 1px solid #00ffd0;
    box-shadow: 0 0 12px rgba(0,255,208,0.4);
}

/ ---------- PREVIEW ---------- /
.preview {
    width: 92%;
    margin: 20px auto;
}

iframe {
    width: 100%;
    height: 280px;
    border: none;
    border-radius: 12px;
}
</style>
</head>

<body>

<div class="bg"></div>

<h1>USERNAME SNIPER PRO</h1>

<div class="container">
    <button onclick="setMode('4C')">4C</button>
    <button onclick="setMode('4L')">4L</button>
    <button onclick="generate()">Generate 100</button>
    <button onclick="copyAll()">Copy</button>
    <button onclick="openAll()">Open All</button>
</div>

<div class="output" id="output"></div>

<div class="preview" id="preview"></div>

<script>
let mode = "4C";
let usernames = [];

function setMode(m) {
    mode = m;
}

function rand(chars) {
    return chars[Math.floor(Math.random() * chars.length)];
}

function isRare(u) {
    if ([...new Set(u)].length === 1) return true;
    if (u[0] === u[1] && u[2] === u[3]) return true;
    if (u === u.split("").reverse().join("")) return true;
    if (/(\w)\1\1/.test(u)) return true;
    return false;
}

/ ---------- GENERATE ---------- /
function generate() {
    usernames = [];

    const chars = mode === "4L"
        ? "abcdefghijklmnopqrstuvwxyz"
        : "abcdefghijklmnopqrstuvwxyz0123456789";

    const container = document.getElementById("output");
    container.innerHTML = "";

    for (let i = 0; i < 100; i++) {
        let u = "";
        for (let j = 0; j < 4; j++) u += rand(chars);

        usernames.push(u);

        const div = document.createElement("div");
        div.className = "user";
        div.innerText = u;

        if (isRare(u)) div.classList.add("rare");

        div.onclick = () => showPreview(u);

        container.appendChild(div);
    }
}

/ ---------- COPY ---------- /
function copyAll() {
    navigator.clipboard.writeText(usernames.join("\n"));
}

/ ---------- OPEN ALL ---------- /
function openAll() {
    usernames.forEach((u, i) => {
        if (i < 12) {
            window.open("https://www.instagram.com/" + u);
        }
    });
}

/ ---------- PREVIEW ---------- */
function showPreview(u) {
    document.getElementById("preview").innerHTML =
        "<iframe src='https://www.instagram.com/" + u + "/'></iframe>";
}
</script>

</body>
</html>
