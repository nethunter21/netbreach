<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Net UI Panel</title>

<style>
body {
    margin: 0;
    background: #050505;
    font-family: Arial, sans-serif;
    color: white;
}

/* main container like netbreach */
.panel {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

/* header */
.title {
    text-align: center;
    font-size: 28px;
    margin-bottom: 20px;
    letter-spacing: 2px;
    color: #00ffcc;
    text-shadow: 0 0 10px #00ffcc;
}

/* account cards */
.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(0,255,204,0.2);
    padding: 18px;
    margin: 12px 0;
    border-radius: 12px;
    cursor: pointer;

    font-size: 18px;

    /* iOS fix: makes taps more reliable */
    touch-action: manipulation;

    transition: 0.2s ease;
}

/* hover (PC) */
.card:hover {
    box-shadow: 0 0 12px #00ffcc;
    transform: scale(1.02);
}

/* tap feedback (iOS) */
.card:active {
    transform: scale(0.98);
}
</style>
</head>

<body>

<div class="panel">
    <div class="title">ACCOUNTS</div>

    <div class="card" data-url="https://google.com">Google Account</div>
    <div class="card" data-url="https://github.com">GitHub Account</div>
    <div class="card" data-url="https://instagram.com">Instagram Account</div>
    <div class="card" data-url="https://twitter.com">Twitter Account</div>
</div>

<script>
/*
FIXED OPEN SYSTEM:
- works on iOS Safari (no missed taps)
- prevents double triggers
- adds small delay queue (not instant spam)
*/

let lock = false;

document.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", () => {

        if (lock) return; // prevents double open
        lock = true;

        const url = card.dataset.url;

        // small realistic delay (feels smoother, avoids instant jump)
        setTimeout(() => {
            window.location.href = url;

            // unlock after navigation attempt
            setTimeout(() => {
                lock = false;
            }, 800);
        }, 250);
    });
});
</script>

</body>
</html>
