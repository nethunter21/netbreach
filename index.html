<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Username Studio</title>

<style>
:root {
    --bg: #050505;
    --card: rgba(255,255,255,0.06);
    --stroke: rgba(255,255,255,0.12);
    --text: #ffffff;
    --muted: rgba(255,255,255,0.6);
    --accent: #00ffd5;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, Arial;
    overflow-x: hidden;
}

/* Animated background */
.bg {
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 20%, rgba(0,255,213,0.12), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.06), transparent 45%),
        radial-gradient(circle at 50% 80%, rgba(0,120,255,0.08), transparent 50%);
    filter: blur(40px);
    animation: floatBg 12s ease-in-out infinite;
    z-index: -1;
}

@keyframes floatBg {
    0% { transform: translate(0,0); }
    50% { transform: translate(-2%, -3%); }
    100% { transform: translate(0,0); }
}

.app {
    max-width: 900px;
    margin: auto;
    padding: 18px;
}

.header {
    text-align: center;
    margin-top: 20px;
}

.header h1 {
    font-size: 22px;
    letter-spacing: 2px;
    margin: 0;
}

.header p {
    color: var(--muted);
    font-size: 13px;
    margin-top: 6px;
}

.card {
    background: var(--card);
    border: 1px solid var(--stroke);
    border-radius: 16px;
    padding: 14px;
    margin-top: 16px;
    backdrop-filter: blur(12px);
}

.row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
}

button {
    flex: 1;
    min-width: 120px;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--stroke);
    background: rgba(255,255,255,0.04);
    color: white;
    font-size: 14px;
    transition: 0.2s;
}

button:active {
    transform: scale(0.96);
}

button.primary {
    border: 1px solid var(--accent);
    box-shadow: 0 0 12px rgba(0,255,213,0.2);
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 10px;
    margin-top: 12px;
}

.user {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 12px;
    border-radius: 12px;
    text-align: center;
    font-size: 13px;
    transition: 0.2s;
    cursor: pointer;
}

.user:active {
    transform: scale(0.95);
}

.user.rare {
    border: 1px solid var(--accent);
    box-shadow: 0 0 14px rgba(0,255,213,0.25);
}

.preview {
    margin-top: 14px;
}

iframe {
    width: 100%;
    height: 280px;
    border: none;
    border-radius: 14px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="app">

    <div class="header">
        <h1>USERNAME STUDIO</h1>
        <p>generate • explore • inspect usernames</p>
    </div>

    <div class="card">
        <div class="row">
            <button onclick="setMode('4C')">4 Characters</button>
            <button onclick="setMode('4L')">4 Letters</button>
        </div>

        <div class="row" style="margin-top:10px;">
            <button class="primary" onclick="generate()">Generate 100</button>
            <button onclick="copyAll()">Copy All</button>
            <button onclick="openAll()">Open All</button>
        </div>
    </div>

    <div class="card">
        <div class="grid" id="grid"></div>
    </div>

    <div class="card preview" id="preview"></div>

</div>

<script>

let mode = "4C";
let usernames = [];

function setMode(m) {
    mode = m;
}

function rand(chars) {
    return chars[Math.floor(Math.random() * chars.length)];
}

function isRare(u) {
    if ([...new Set(u)].length === 1) return true;
    if (u[0] === u[1] && u[2] === u[3]) return true;
    if (u === u.split("").reverse().join("")) return true;
    if (/(\w)\1\1/.test(u)) return true;
    return false;
}

function generate() {
    usernames = [];
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    const chars = mode === "4L"
        ? "abcdefghijklmnopqrstuvwxyz"
        : "abcdefghijklmnopqrstuvwxyz0123456789";

    for (let i = 0; i < 100; i++) {
        let u = "";
        for (let j = 0; j < 4; j++) u += rand(chars);

        usernames.push(u);

        const div = document.createElement("div");
        div.className = "user";
        div.textContent = u;

        if (isRare(u)) div.classList.add("rare");

        div.onclick = () => preview(u);

        grid.appendChild(div);
    }
}

function copyAll() {
    navigator.clipboard.writeText(usernames.join("\n"));
}

function openAll() {
    usernames.slice(0, 12).forEach(u => {
        window.open("https://www.instagram.com/" + u);
    });
}

function preview(u) {
    document.getElementById("preview").innerHTML =
        `<iframe src="https://www.instagram.com/${u}/"></iframe>`;
}

</script>

</body>
</html>
